<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Periodic Table of Elements</title>
        <link rel="icon" href="logo.png" type="image/x-icon" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Periodic Table of the Elements</h1>
        <div class="grid" id="grid"></div>
        <div class="legend" id="legend"></div>
        <div class="modal" id="modal">
            <div class="mcard" id="mcard">
                <button class="xbtn" onclick="close_()">✕</button>
                <div class="m-num" id="mn"></div>
                <div class="m-sym" id="ms"></div>
                <div class="m-name" id="mm"></div>
                <div class="m-mass" id="mw"></div>
                <div class="m-cat" id="mc"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
